<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#18181b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <g transform="translate(50 50)">
    <!-- Outer subtle dashed ring -->
    <circle cx="0" cy="0" r="46" stroke-dasharray="2 4" stroke-width="1.2" />
    <!-- Interlocking ellipses representing facets of human personality -->
    <ellipse cx="0" cy="0" rx="40" ry="12" transform="rotate(0)" />
    <ellipse cx="0" cy="0" rx="40" ry="12" transform="rotate(30)" />
    <ellipse cx="0" cy="0" rx="40" ry="12" transform="rotate(60)" />
    <ellipse cx="0" cy="0" rx="40" ry="12" transform="rotate(90)" />
    <ellipse cx="0" cy="0" rx="40" ry="12" transform="rotate(120)" />
    <ellipse cx="0" cy="0" rx="40" ry="12" transform="rotate(150)" />
    <!-- Inner geometric core -->
    <circle cx="0" cy="0" r="18" />
    <circle cx="0" cy="0" r="5" fill="#18181b" />
  </g>
</svg>
